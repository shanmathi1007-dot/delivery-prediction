<!DOCTYPE html>
<html>
<head>
    <title>Delivery Time Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h2>Delivery Time Predictor</h2>

    <form action="/predict" method="POST">
        Distance (km): <input type="number" name="distance_km" required>

        Product:
        <select name="product_category">
            <option>Electronics</option>
            <option>Clothing</option>---
            <option>Home</option>
        </select><br><br>

        Priority:+++++
        <select name="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select><br><br>

        Shipping:
        <select name="shipping_mode">
            <option>Standard</option>
            <option>Express</option>
        </select><br><br>

        Weather:
        <select name="weather">
            <option>Clear</option>
            <option>Rain</option>
            <option>Storm</option>
        </select><br><br>

        Stock:
        <select name="stock_available">
            <option value="1">In Stock</option>
            <option value="0">Out of Stock</option>
        </select><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Estimated Delivery Time: 
    {{ prediction }} Days</h3>
    {% endif %}
</body>
</html>
